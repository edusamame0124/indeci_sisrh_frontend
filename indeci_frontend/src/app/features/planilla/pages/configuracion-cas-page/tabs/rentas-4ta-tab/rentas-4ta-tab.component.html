<div class="r4ta-container">

  <div class="r4ta-page-header">
    <mat-icon fontIcon="receipt_long" class="r4ta-page-header__icon" aria-hidden="true" />
    <div>
      <h2 class="r4ta-page-header__title">Configuración anual de 4ta categoría</h2>
      <p class="r4ta-page-header__desc">
        Gestión de vigencias anuales para retención IR 4ta Categoría — personal CAS.
        TUO LIR Art. 33 inc. e) · D.S. 122-94-EF · SUNAT 3042
      </p>
    </div>
  </div>

  <mat-tab-group animationDuration="150ms" class="r4ta-inner-tabs">

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="receipt_long" aria-hidden="true" />
        4ta CAS
      </ng-template>
      <div class="r4ta-tab-content">
        <app-rentas-4ta-cas-tab />
      </div>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="upload_file" aria-hidden="true" />
        Carga Masiva
      </ng-template>
      <div class="r4ta-tab-content">
        <app-import-masiva-ir4ta />
      </div>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="calculate" aria-hidden="true" />
        Resolver
      </ng-template>
      <div class="r4ta-tab-content">
        <app-resolver-ir4ta />
      </div>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="history" aria-hidden="true" />
        Historial
      </ng-template>
      <div class="r4ta-tab-content">
        <app-historial-ir4ta />
      </div>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="admin_panel_settings" aria-hidden="true" />
        Auditoría
      </ng-template>
      <div class="r4ta-tab-content">
        <app-auditoria-ir4ta />
      </div>
    </mat-tab>

  </mat-tab-group>

</div>
