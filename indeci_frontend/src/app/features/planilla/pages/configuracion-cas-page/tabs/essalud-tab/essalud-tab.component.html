<div class="es-container">
  <div class="es-page-header">
    <mat-icon fontIcon="health_and_safety" class="es-page-header__icon" aria-hidden="true" />
    <div>
      <h2 class="es-page-header__title">Configuración EsSalud / EPS</h2>
      <p class="es-page-header__desc">
        Gestión de vigencias de tasas EsSalud para personal CAS.
        D.S. 009-97-SA · Ley 26790 · D.Leg. 1057
      </p>
    </div>
  </div>

  <mat-tab-group animationDuration="150ms" class="es-inner-tabs">

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="health_and_safety" aria-hidden="true" />
        EsSalud CAS
      </ng-template>
      <div class="es-tab-content">
        <app-essalud-cas-tab />
      </div>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="calculate" aria-hidden="true" />
        Resolver
      </ng-template>
      <div class="es-tab-content">
        <app-resolver-essalud />
      </div>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="history" aria-hidden="true" />
        Historial
      </ng-template>
      <div class="es-tab-content">
        <app-historial-essalud />
      </div>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontIcon="admin_panel_settings" aria-hidden="true" />
        Auditoría
      </ng-template>
      <div class="es-tab-content">
        <app-auditoria-essalud />
      </div>
    </mat-tab>

  </mat-tab-group>
</div>
