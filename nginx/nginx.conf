# INDECI — API Gateway / reverse proxy (producción)
# SpecMicroservicios.md §6
# Ajuste rutas de alias (C:/deploy/...) según despliegue real.

upstream sisrh_backend {
    server 127.0.0.1:8080;
}

upstream sisconv_backend {
    server 127.0.0.1:8081;
}

upstream gdr_backend {
    server 127.0.0.1:8082;
}

server {
    listen 80;
    server_name 10.64.24.19;

    # === APIs ===
    location /api/sisrh/ {
        proxy_pass         http://sisrh_backend/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/sisconv/ {
        proxy_pass         http://sisconv_backend/api/sisconv/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/gdr-access/ {
        proxy_pass         http://gdr_backend/api/gdr-access/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Compatibilidad: SISRH expone /api directamente en dev
    location /api/ {
        proxy_pass         http://sisrh_backend/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # === Frontends ===
    location /convocatoria/ {
        alias C:/deploy/sisconv-frontend/;
        try_files $uri $uri/ /convocatoria/index.html;
    }

    location /gdr/ {
        alias C:/deploy/gdr-frontend/;
        try_files $uri $uri/ /gdr/index.html;
    }

    location / {
        alias C:/deploy/sisrh-frontend/;
        try_files $uri $uri/ /index.html;
    }
}
